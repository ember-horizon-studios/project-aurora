<svg viewBox="0 0 520 490" xmlns="http://www.w3.org/2000/svg" width="520" height="490">
  <defs>
    <clipPath id="circle-clip">
      <circle cx="260" cy="210" r="152"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="520" height="490" fill="#0c0c12"/>

  <!-- Circle base (sky) -->
  <circle cx="260" cy="210" r="152" fill="#0c0c12"/>

  <!-- Orange sun — large circle rising from horizon, clipped -->
  <circle cx="260" cy="340" r="145" fill="#e07a3a" clip-path="url(#circle-clip)"/>

  <!-- Mountain silhouettes — 3 separate peaks so orange shows in valleys -->
  <polygon points="50,380 162,205 252,380"  fill="#0c0c12" clip-path="url(#circle-clip)"/>
  <polygon points="188,380 260,143 332,380" fill="#0c0c12" clip-path="url(#circle-clip)"/>
  <polygon points="248,380 358,205 470,380" fill="#0c0c12" clip-path="url(#circle-clip)"/>

  <!-- Circle ring -->
  <circle cx="260" cy="210" r="152" fill="none" stroke="#e07a3a" stroke-width="4"/>

  <!-- EMBER HORIZON -->
  <text
    x="260" y="422"
    font-family="'Arial Black', Impact, 'Helvetica Neue', Arial, sans-serif"
    font-size="38" font-weight="900"
    fill="#f0ede6"
    text-anchor="middle"
    letter-spacing="6">EMBER HORIZON</text>

  <!-- Decorative line left -->
  <line x1="52" y1="449" x2="170" y2="449" stroke="#f0ede6" stroke-width="1" opacity="0.4"/>

  <!-- STUDIOS -->
  <text
    x="260" y="455"
    font-family="Arial, 'Helvetica Neue', sans-serif"
    font-size="13" font-weight="400"
    fill="#f0ede6"
    text-anchor="middle"
    letter-spacing="10">STUDIOS</text>

  <!-- Decorative line right -->
  <line x1="350" y1="449" x2="468" y2="449" stroke="#f0ede6" stroke-width="1" opacity="0.4"/>
</svg>
