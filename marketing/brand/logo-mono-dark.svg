<svg viewBox="0 0 520 490" xmlns="http://www.w3.org/2000/svg" width="520" height="490">
  <!-- Transparent background — use on light surfaces -->
  <defs>
    <clipPath id="circle-clip">
      <circle cx="260" cy="210" r="152"/>
    </clipPath>
    <mask id="mountain-mask">
      <!-- White = show, Black = hide (cut out mountains) -->
      <circle cx="260" cy="210" r="152" fill="white"/>
      <polygon points="50,380 162,205 252,380"  fill="black"/>
      <polygon points="188,380 260,143 332,380" fill="black"/>
      <polygon points="248,380 358,205 470,380" fill="black"/>
    </mask>
  </defs>

  <!-- Filled circle with mountains cut out as negative space -->
  <circle cx="260" cy="210" r="152" fill="#0c0c12" mask="url(#mountain-mask)"/>

  <!-- Circle ring -->
  <circle cx="260" cy="210" r="152" fill="none" stroke="#0c0c12" stroke-width="4"/>

  <!-- EMBER HORIZON -->
  <text
    x="260" y="422"
    font-family="'Arial Black', Impact, 'Helvetica Neue', Arial, sans-serif"
    font-size="38" font-weight="900"
    fill="#0c0c12"
    text-anchor="middle"
    letter-spacing="6">EMBER HORIZON</text>

  <!-- Decorative line left -->
  <line x1="52" y1="449" x2="170" y2="449" stroke="#0c0c12" stroke-width="1" opacity="0.5"/>

  <!-- STUDIOS -->
  <text
    x="260" y="455"
    font-family="Arial, 'Helvetica Neue', sans-serif"
    font-size="13" font-weight="400"
    fill="#0c0c12"
    text-anchor="middle"
    letter-spacing="10">STUDIOS</text>

  <!-- Decorative line right -->
  <line x1="350" y1="449" x2="468" y2="449" stroke="#0c0c12" stroke-width="1" opacity="0.5"/>
</svg>
